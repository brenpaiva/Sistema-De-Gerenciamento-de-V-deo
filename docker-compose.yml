services:
  viewer:
    build: .
    image: gesec-viewer:latest
    network_mode: host
    environment:
      DISPLAY: ${DISPLAY:-:0}
      QT_QPA_PLATFORM: xcb
      QT_X11_NO_MITSHM: "1"
    volumes:
      - .:/app
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    stdin_open: true
    tty: true
    command: python -m gesec_viewer --config ${CONFIG:-config/demo.yaml} --gpu ${GPU_MODE:-auto} --hw-decode ${HW_DECODE:-auto}
